name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf automake libtool libtool-bin libltdl-dev pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev python3-pip openjdk-17-jdk ant ccache
          pip3 install --upgrade pip
          pip3 install cython virtualenv buildozer

      - name: Setup Android SDK and Accept Licenses
        run: |
          # 1. Run a dummy build so Buildozer pulls down the initial SDK structure
          buildozer android debug || true
          
          # 2. Explicitly define the SDK root directory path
          SDK_ROOT="/home/runner/.buildozer/android/platform/android-sdk"
          SDK_MANAGER="$SDK_ROOT/tools/bin/sdkmanager"
          
          # 3. Pass the mandatory --sdk_root flag to fix the IllegalArgumentException crash
          if [ -f "$SDK_MANAGER" ]; then
            echo "Found sdkmanager. Accepting licenses with explicit sdk_root..."
            yes | "$SDK_MANAGER" --sdk_root="$SDK_ROOT" --licenses
          else
            # Fallback dynamic search if paths change
            DYNAMIC_MANAGER=$(find /home/runner/.buildozer/android/platform/ -name sdkmanager | head -n 1)
            if [ -f "$DYNAMIC_MANAGER" ]; then
              echo "Found sdkmanager dynamically at $DYNAMIC_MANAGER"
              yes | "$DYNAMIC_MANAGER" --sdk_root="$SDK_ROOT" --licenses
            fi
          fi

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin/
          # Removed the 'rm -rf' line so we don't accidentally wipe the SDK we just authorized
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package
          path: bin/*.apk
