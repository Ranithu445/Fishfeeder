name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Runs inside an official, pre-configured isolated container.
      # Removed "yes |" to prevent Docker from crashing on the pipe symbol.
      # The container handles license agreements natively!
      - name: Build with Buildozer Container
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      # Automatically grabs the compiled binary from the container 
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: ${{ steps.buildozer.outputs.filename }}
