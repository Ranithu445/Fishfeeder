name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev python3-pip openjdk-17-jdk ant ccache
          pip3 install --user --upgrade buildozer cython

      - name: Setup Android SDK and Accept Licenses
        run: |
          # Run a dummy buildozer command to force-create the SDK directory structure
          buildozer android debug || true
          
          # Locate the SDK manager dynamically
          SDK_MANAGER=$(find /home/runner/.buildozer/android/platform/android-sdk -name sdkmanager | head -n 1)
          
          # Pre-install the specific build-tools and platform components required
          # The 'yes |' pipes the license acceptance automatically
          if [ -f "$SDK_MANAGER" ]; then
            yes | "$SDK_MANAGER" --sdk_root=/home/runner/.buildozer/android/platform/android-sdk "platforms;android-33" "build-tools;37.0.0" "platform-tools"
            
            # Explicitly accept all remaining licenses
            yes | "$SDK_MANAGER" --sdk_root=/home/runner/.buildozer/android/platform/android-sdk --licenses
          fi

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          # -v provides the verbose output needed for debugging
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package
          path: bin/*.apk
