name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf automake libtool libtool-bin libltdl-dev pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev python3-pip openjdk-17-jdk ant ccache
          pip3 install --upgrade pip
          pip3 install cython virtualenv buildozer

      - name: Setup Android SDK and Accept Licenses
        run: |
          # 1. Start a dummy build so Buildozer downloads the exact SDK tools it needs based on your buildozer.spec
          buildozer android debug || true
          
          # 2. Dynamically locate where Buildozer installed the sdkmanager executable
          SDK_MANAGER=$(find /home/runner/.buildozer/android/platform/ -name sdkmanager | head -n 1)
          
          # 3. If found, automatically accept all licenses for the downloaded tools
          if [ -f "$SDK_MANAGER" ]; then
            echo "Found sdkmanager at $SDK_MANAGER. Accepting licenses..."
            yes | "$SDK_MANAGER" --licenses
          else
            echo "sdkmanager not found yet. Proceeding to main build step."
          fi

      - name: Clean Cache and Build Fresh APK
        run: |
          export PATH=$PATH:~/.local/bin/
          
          # Wipe old runner state to prevent tool caching conflicts
          rm -rf .buildozer/
          
          # Run the actual target build
          buildozer -v android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package
          path: bin/*.apk
