name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Install all necessary tools and Java for Android building
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev python3-pip openjdk-17-jdk
          pip3 install --user --upgrade buildozer cython

      - name: Build with Buildozer
        env:
          # This automatically accepts all Android SDK licenses
          ANDROIDSDK_ACCEPT_LICENSES: 1
        run: |
          # Ensure buildozer is in path and run the build
          export PATH=$PATH:~/.local/bin/
          buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
