name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # CRITICAL FIX: Overrides the default Java 11 and sets up a clean Java 17 environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf automake libtool libtool-bin libltdl-dev pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev python3-pip ant ccache
          pip3 install --upgrade pip
          pip3 install cython virtualenv buildozer

      # Clean out old artifacts built under the wrong Java version
      - name: Clean Old Build Cache
        run: rm -rf .buildozer/

      - name: Build APK with Auto-License Acceptance
        run: |
          export PATH=$PATH:~/.local/bin/
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package
          path: bin/*.apk
