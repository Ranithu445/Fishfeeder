name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade cython buildozer

      - name: Manually Install Android SDK Command Line Tools
        run: |
          # 1. Create the SDK directory structure
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          
          # 2. Download the modern command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          
          # 3. Unzip them into the expected folder
          unzip -q cmdline-tools.zip -d $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          
          # 4. Rename the folder to 'latest' so the SDK recognizes it
          mv $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest

      - name: Build with Buildozer
        run: |
          # Force the path to look for tools here
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
